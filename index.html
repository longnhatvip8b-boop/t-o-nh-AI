<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LNHAT AI Ultimate Studio</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #9900ff;
            --bg-dark: #06060b;
            --panel-bg: rgba(15, 15, 25, 0.6);
            --border-glow: rgba(0, 255, 204, 0.25);
            --accent-glow: rgba(153, 0, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(0, 255, 204, 0.15), transparent 40%),
                radial-gradient(circle at 85% 70%, rgba(153, 0, 255, 0.15), transparent 40%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 60px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 8px var(--primary), 0 0 25px rgba(0, 255, 204, 0.5);
            margin-top: 40px;
            margin-bottom: 6px;
            font-size: 36px;
            text-align: center;
            font-weight: 900;
        }
        .subtitle {
            color: #b5b5bc;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        #app-container {
            width: 92%;
            max-width: 850px;
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-sizing: border-box;
        }

        /* Tabs điều hướng */
        .mode-tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 14px;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #8a8a93;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .tab-btn.active {
            color: var(--primary);
            background: rgba(0, 255, 204, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* Khung chứa các cài đặt tùy chỉnh nâng cao */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            background: rgba(0, 0, 0, 0.35);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label { 
            color: var(--primary); 
            font-size: 15px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        select {
            background: #0d0d13;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        textarea {
            width: 100%;
            height: 110px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.25);
            background: rgba(0, 0, 0, 0.5);
        }

        /* Panel Image-to-Image */
        #image-inspiration-panel {
            display: none;
            background: rgba(153, 0, 255, 0.03);
            border: 2px dashed rgba(153, 0, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        #image-inspiration-panel.active { display: block; }
        
        .upload-zone {
            position: relative;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: inline-block;
            transition: all 0.2s;
        }
        .upload-zone:hover {
            border-color: var(--secondary);
            background: rgba(153, 0, 255, 0.05);
        }
        .upload-zone input[type="file"] {
            position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }

        #preview-inspiration-img {
            max-width: 160px;
            max-height: 160px;
            margin-top: 15px;
            border-radius: 12px;
            display: none;
            border: 2px solid var(--secondary);
            object-fit: cover;
            box-shadow: 0 0 15px rgba(153, 0, 255, 0.3);
        }

        /* Lưới chọn Style */
        .style-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .style-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ccc;
            padding: 12px 10px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .style-btn:hover { 
            background: rgba(255, 255, 255, 0.08); 
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        .style-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.2), rgba(153, 0, 255, 0.1));
            border-color: var(--primary);
            color: var(--primary);
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(0, 255, 204, 0.15);
        }

        #generate-btn {
            background: linear-gradient(45deg, var(--primary), #00b3ff, var(--secondary));
            background-size: 200% auto;
            color: #000;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 6px 25px rgba(0, 255, 204, 0.35);
            margin-top: 8px;
        }
        #generate-btn:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 255, 204, 0.5);
        }
        #generate-btn:disabled {
            background: #1a1a24;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Container kết quả tối ưu hiển thị */
        #result-container {
            width: 100%;
            min-height: 400px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 2px dashed rgba(255, 255, 255, 0.06);
            box-sizing: border-box;
            padding: 12px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }
        
        #result-image {
            width: 100%;
            height: auto;
            max-height: 580px;
            border-radius: 16px;
            display: none;
            object-fit: contain;
            box-shadow: 0 10px 40px rgba(0, 255, 204, 0.3);
        }

        #loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            text-align: center;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            border-bottom-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-text {
            color: var(--primary);
            font-size: 15px;
            line-height: 1.6;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>LNHAT AI STUDIO</h1>
    <div class="subtitle">Hệ thống xử lý đồ họa AI Đa Luồng & Tự Động Khắc Phục Lỗi Kết Nối</div>

    <div id="app-container">
        
        <!-- Chọn tác vụ tạo ảnh -->
        <div class="mode-tabs">
            <button class="tab-btn active" id="tab-text" onclick="switchMode('text')">✨ Vẽ từ mô tả</button>
            <button class="tab-btn" id="tab-image" onclick="switchMode('image')">🖼 Lấy ý tưởng từ ảnh gốc</button>
        </div>

        <!-- Panel chọn ảnh mẫu (Chỉ dành cho Image-to-Image) -->
        <div id="image-inspiration-panel">
            <div class="upload-zone">
                <span>📁 Chọn file ảnh nền làm mẫu</span>
                <input type="file" id="inspiration-file" accept="image/*" onchange="handleImageUpload(event)">
            </div>
            <center><img id="preview-inspiration-img" alt="Inspiration Base Canvas"></center>
        </div>

        <!-- Ô nhập nội dung văn bản -->
        <div class="input-group">
            <label id="prompt-label">1. Nhập ý tưởng nghệ thuật (Hỗ trợ Tiếng Việt tự động dịch):</label>
            <textarea id="prompt-input" placeholder="Ví dụ: Một chiến binh robot tương lai đứng dưới mưa neon, phong cách cyberpunk, góc nhìn rộng nghệ thuật..."></textarea>
        </div>

        <!-- Khu vực Cài đặt nâng cao (Nhiều tính năng vẽ mới) -->
        <div class="settings-grid">
            <div class="input-group">
                <label>Tỷ lệ khung hình:</label>
                <select id="aspect-ratio">
                    <option value="1:1" selected>1:1 (Ảnh Vuông)</option>
                    <option value="16:9">16:9 (Màn Ảnh Rộng VIP)</option>
                    <option value="9:16">9:16 (Màn Hình Dọc Phone)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Mức độ xử lý AI:</label>
                <select id="enhance-level">
                    <option value="false">Mặc định (Tốc độ cao)</option>
                    <option value="true" selected>Siêu việt (Tăng cường chi tiết VIP)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Hệ thống Engine AI:</label>
                <select id="ai-model">
                    <option value="default" selected>Flux-Auto (Khuyên dùng)</option>
                    <option value="anime">Flux-Specialized Anime</option>
                    <option value="turbo">Speed Turbo Engine</option>
                </select>
            </div>
        </div>

        <!-- Bảng lựa chọn Style phong phú -->
        <div class="input-group">
            <label>2. Chọn phong cách hình ảnh mong muốn:</label>
            <div class="style-options">
                <button class="style-btn active" data-style="">Không bộ lọc</button>
                <button class="style-btn" data-style="masterpiece, high quality anime art, studio ghibli dynamic illustration, vibrant aesthetic, detailed sharp keys, makoto shinkai vibe">Anime / Manga</button>
                <button class="style-btn" data-style="intricate cyberpunk aesthetic, futuristic neon city illumination, cinematic 3d rendering, ray tracing, flawless neon details, photorealistic octane render">Cyberpunk</button>
                <button class="style-btn" data-style="award-winning photorealistic photography, ultra detailed 8k cinematic lighting, moody depth of field, sharp hyperrealistic focus, professional canon lens, masterpiece">Siêu Thực</button>
                <button class="style-btn" data-style="charming 3d model, detailed claymation style, cute clay world environment background, soft studio lighting, stop-motion look">Đất sét (Clay)</button>
                <button class="style-btn" data-style="gta v loading screen artwork style, highly detailed cell shaded vector illustration, rockstar games aesthetic, high contrast dramatic poster">GTA V Art</button>
                <button class="style-btn" data-style="creative lego brick construction layout, high block definition toy portrait, detailed lego pieces, macro miniature depth">Đồ chơi Lego</button>
                <button class="style-btn" data-style="exquisite pencil sketch drawing portrait, cross hatch shader line art texturing, hand-drawn fine details, vintage graphite masterpiece">Phác thảo chì</button>
            </div>
        </div>
        
        <button id="generate-btn" onclick="startGenerationProcess()">Khởi Động Lõi Vẽ AI</button>

        <!-- Khung kết quả đồ họa -->
        <div id="result-container">
            <div id="loading">
                <div class="loader"></div>
                <div class="loading-text" id="loading-msg">Hệ thống đang dịch toán văn bản...</div>
            </div>
            <img id="result-image" alt="LNHAT Generated Output">
        </div>
    </div>

    <script>
        let currentMode = "text";
        let selectedStyle = "";
        let retryCount = 0; // Biến theo dõi số lần thử lại tự động khi server lỗi
        const maxRetries = 3; // Số lần tối đa tự động cứu vớt kết nối
        let lastBuiltUrl = ""; // Lưu link ảnh cuối cùng để xử lý tái tạo khi lỗi

        // --- ĐIỀU HƯỚNG TAB CHẾ ĐỘ ---
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-text').classList.toggle('active', mode === 'text');
            document.getElementById('tab-image').classList.toggle('active', mode === 'image');
            document.getElementById('image-inspiration-panel').classList.toggle('active', mode === 'image');
            document.getElementById('prompt-label').innerText = mode === 'text' 
                ? "1. Nhập ý tưởng nghệ thuật (Hỗ trợ Tiếng Việt tự động dịch):" 
                : "2. Mô tả các chi tiết muốn thay đổi, thêm thắt dựa trên ảnh gốc:";
        }

        // --- XỬ LÝ CHỌN FILE ẢNH MẪU ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview-inspiration-img');
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        // --- CHỌN STYLE BỘ LỌC ---
        const styleBtns = document.querySelectorAll('.style-btn');
        styleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                styleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedStyle = btn.getAttribute('data-style');
            });
        });

        // --- CƠ CHẾ DỊCH GOOGLE TRÊN TRÌNH DUYỆT (TỐI ƯU TOÀN DIỆN CHỐNG CHẶN) ---
        async function translateText(text) {
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=vi&tl=en&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json();
                return data?.[0]?.map(item => item[0]).join('') || text;
            } catch (e) {
                return text; // Fallback dùng chữ gốc nếu API dịch nghẽn mạng
            }
        }

        // --- QUY TRÌNH KÍCH HOẠT LÕI VẼ AI ---
        async function startGenerationProcess() {
            const promptInput = document.getElementById('prompt-input');
            const originalPrompt = promptInput.value.trim();
            
            if (!originalPrompt) {
                alert("Vui lòng điền nội dung hoặc ý tưởng vẽ tranh vào ô trống nhé!");
                promptInput.focus();
                return;
            }

            if (currentMode === 'image' && !document.getElementById('preview-inspiration-img').src) {
                alert("Bạn đang bật chế độ vẽ dựa trên ảnh gốc nhưng chưa upload ảnh mẫu nào cả!");
                return;
            }

            retryCount = 0; // Reset số lần thử lại về 0 khi bắt đầu lượt vẽ mới
            toggleUIState(true);
            
            updateLoadingMessage("🌐 Đang biên dịch ý nghĩa ngôn ngữ sang Tiếng Anh chuẩn...");
            const translatedPrompt = await translateText(originalPrompt);

            // Bắt đầu khởi tạo cấu trúc URL vẽ ảnh dựa trên các tham số cấu hình nâng cao
            buildAndLoadImage(translatedPrompt);
        }

        // --- HÀM TẠO URL VÀ NẠP ĐỒ HỌA (CÓ CHỐNG LỖI CONTEXT/SERVER) ---
        function buildAndLoadImage(promptText) {
            const resultImage = document.getElementById('result-image');
            
            // Lấy dữ liệu cấu hình từ các thẻ select mới thêm
            const ratio = document.getElementById('aspect-ratio').value;
            const enhance = document.getElementById('enhance-level').value;
            const model = document.getElementById('ai-model').value;

            // Xử lý kích thước ảnh động dựa theo tỷ lệ người dùng chọn
            let width = 1024, height = 1024;
            if (ratio === "16:9") { width = 1280; height = 720; }
            else if (ratio === "9:16") { width = 720; height = 1280; }

            // Gộp style và làm sạch ký tự lạ có thể phá hỏng chuỗi URL mã hóa
            let rawPrompt = selectedStyle ? `${promptText}, ${selectedStyle}` : promptText;
            
            // BUFF VIP: Tự động bơm thêm Prompt cao cấp bí mật nếu bật chế độ Siêu Việt nhằm tăng độ bám sát ý muốn và độ sắc nét
            if (enhance === "true") {
                rawPrompt = `${rawPrompt}, highly aesthetic masterwork, extremely detailed textures, flawless composition, elegant global illumination, trending on artstation art portfolios`;
            }

            rawPrompt = rawPrompt.replace(/[^a-zA-Z0-9 ,]/g, '');

            if (currentMode === 'image') {
                rawPrompt = `Transforming uploaded base picture canvas perspective elements into: ${rawPrompt}`;
            }

            // Tạo mã seed ngẫu nhiên + token thời gian để tránh trình duyệt lấy lại ảnh cũ trong bộ nhớ đệm (Cache)
            const randomSeed = Math.floor(Math.random() * 99999999) + retryCount; 
            
            // Thiết lập Model Engine tương ứng
            let modelPath = "";
            if (model === "anime") modelPath = "&model=anime";
            else if (model === "turbo") modelPath = "&model=turbo";

            updateLoadingMessage(`🎨 Đang kết nối luồng đồ họa AI... <br>[Lượt thử: ${retryCount + 1}/${maxRetries + 1}]`);

            // Đóng gói URL API hoàn chỉnh
            lastBuiltUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(rawPrompt)}?seed=${randomSeed}&width=${width}&height=${height}&nologo=true&enhance=${enhance}${modelPath}`;

            // Tạo một đối tượng hình ảnh ảo ẩn để tải trước (Pre-loading pattern) tránh giật lag khung hình
            const imageBypassLoader = new Image();
            
            imageBypassLoader.onload = function() {
                // Tải thành công tuyệt đối! Gán ảnh vào giao diện và hiển thị rộng mở
                resultImage.src = this.src;
                document.getElementById('loading').style.style.display = 'none'; // Dự phòng lỗi cú pháp hiển thị
                document.getElementById('loading').style.display = 'none';
                resultImage.style.display = 'block';
                toggleUIState(false);
            };

            imageBypassLoader.onerror = function() {
                // PHÁT HIỆN LỖI KẾT NỐI SERVER ĐỒ HỌA
                if (retryCount < maxRetries) {
                    retryCount++;
                    console.warn(`Lỗi phản hồi hệ thống AI. Tiến hành đổi Token và tự động thử lại lượt thứ ${retryCount}...`);
                    // Gọi đệ quy lại hàm nạp, tự động đổi Seed để bypass điểm nghẽn của Server Pollinations
                    buildAndLoadImage(promptText);
                } else {
                    // Nếu thử lại vượt quá 3 lần vẫn lỗi (Do máy chủ sập hoàn toàn hoặc mất mạng internet thật)
                    document.getElementById('loading').style.display = 'none';
                    alert("❌ Máy chủ AI hiện đang quá tải nghiêm trọng hoặc thiết bị của bạn mất kết nối Internet thật. Hãy bấm nút vẽ lại sau vài giây nhé!");
                    toggleUIState(false);
                }
            };

            // Kích hoạt tiến trình tải ảnh ngầm
            imageBypassLoader.src = lastBuiltUrl;
        }

        // --- CÁC HÀM TRỢ NĂNG PHỤ TRỢ ---
        function toggleUIState(isLoading) {
            const btn = document.getElementById('generate-btn');
            const promptInput = document.getElementById('prompt-input');
            
            promptInput.disabled = isLoading;
            btn.disabled = isLoading;
            btn.innerText = isLoading ? "🤖 AI ĐANG VẼ TRANH..." : "KHỞI ĐỘNG LÕI VẼ AI";
            
            if (isLoading) {
                document.getElementById('result-image').style.display = 'none';
                document.getElementById('loading').style.display = 'flex';
            }
        }

        function updateLoadingMessage(msg) {
            document.getElementById('loading-msg').innerHTML = msg;
        }
    </script>
</body>
</html>
